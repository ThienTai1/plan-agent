<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Chat Simulator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f17;
      --surface: #1a1a2e;
      --surface-2: #222240;
      --accent: #7c3aed;
      --accent-glow: rgba(124, 58, 237, 0.3);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --border: #2d2d4a;
      --thought-bg: rgba(124, 58, 237, 0.08);
      --thought-border: rgba(124, 58, 237, 0.25);
      --status-bg: rgba(34, 197, 94, 0.08);
      --status-border: rgba(34, 197, 94, 0.25);
      --action-bg: rgba(59, 130, 246, 0.08);
      --action-border: rgba(59, 130, 246, 0.3);
      --user-bg: linear-gradient(135deg, #7c3aed, #6d28d9);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 16px 24px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header .dot {
      width: 10px; height: 10px;
      background: #22c55e;
      border-radius: 50%;
      box-shadow: 0 0 8px rgba(34, 197, 94, 0.5);
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .header .badge {
      font-size: 11px;
      background: var(--accent);
      padding: 2px 8px;
      border-radius: 10px;
      font-weight: 500;
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .chat-area::-webkit-scrollbar { width: 6px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* Messages */
    .msg { max-width: 85%; animation: fadeIn 0.3s ease; }
    .msg.user { align-self: flex-end; }
    .msg.ai { align-self: flex-start; }

    .msg .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border-bottom-right-radius: 4px;
      color: #fff;
    }
    .msg.ai .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* Thought/Status Pills */
    .event-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      animation: fadeIn 0.3s ease;
      max-width: 85%;
    }
    .event-pill.thought {
      background: var(--thought-bg);
      border: 1px solid var(--thought-border);
      color: #a78bfa;
    }
    .event-pill.status {
      background: var(--status-bg);
      border: 1px solid var(--status-border);
      color: #4ade80;
    }
    .event-pill .icon { font-size: 14px; }

    /* Actions Checklist */
    .actions-card {
      max-width: 85%;
      background: var(--action-bg);
      border: 1px solid var(--action-border);
      border-radius: 12px;
      padding: 12px 16px;
      animation: fadeIn 0.3s ease;
    }
    .actions-card .title {
      font-size: 12px;
      font-weight: 600;
      color: #60a5fa;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .actions-card .action-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 4px 0;
      font-size: 13px;
      color: var(--text-muted);
    }
    .actions-card .action-item .check {
      width: 16px; height: 16px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      flex-shrink: 0;
    }
    .actions-card .action-item.completed .check {
      background: #22c55e;
      border-color: #22c55e;
      color: #fff;
    }
    .actions-card .action-item.pending .check {
      border-color: #60a5fa;
    }

    /* Typing indicator */
    .typing-indicator {
      display: flex;
      gap: 4px;
      padding: 12px 16px;
    }
    .typing-indicator span {
      width: 8px; height: 8px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

    /* Input Area */
    .input-area {
      padding: 16px 24px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .input-row {
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .input-row input {
      flex: 1;
      padding: 12px 16px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .input-row input::placeholder { color: var(--text-muted); }
    .input-row button {
      padding: 12px 20px;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .input-row button:hover { background: #6d28d9; transform: translateY(-1px); }
    .input-row button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="dot"></div>
  <h1>Agent Chat Simulator</h1>
  <span class="badge">Hierarchical V4</span>
</div>

<div class="chat-area" id="chatArea"></div>

<div class="input-area">
  <div class="input-row">
    <input type="text" id="queryInput" placeholder="Nhập câu hỏi... (ví dụ: Tạo task mua sữa và xem lịch ngày mai)" autofocus>
    <button id="sendBtn" onclick="sendMessage()">Gửi</button>
  </div>
</div>

<script>
const API_BASE = 'http://localhost:8100/v1/agent';
const chatArea = document.getElementById('chatArea');
const queryInput = document.getElementById('queryInput');
const sendBtn = document.getElementById('sendBtn');
let history = [];

queryInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
});

function scrollToBottom() {
  chatArea.scrollTop = chatArea.scrollHeight;
}

function addUserMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg user';
  div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div>`;
  chatArea.appendChild(div);
  scrollToBottom();
}

function addAIMessage(text) {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.innerHTML = `<div class="bubble">${formatMarkdown(text)}</div>`;
  chatArea.appendChild(div);
  scrollToBottom();
}

function addEventPill(type, text) {
  const div = document.createElement('div');
  const icon = type === 'thought' ? '🧠' : 'ℹ️';
  div.className = `event-pill ${type}`;
  div.innerHTML = `<span class="icon">${icon}</span> ${escapeHtml(text)}`;
  chatArea.appendChild(div);
  scrollToBottom();
}

function addActionsCard(actions) {
  const div = document.createElement('div');
  div.className = 'actions-card';
  div.id = 'actionsCard';
  let items = actions.map(a => `
    <div class="action-item ${a.status}">
      <div class="check">${a.status === 'completed' ? '✓' : ''}</div>
      <span>${escapeHtml(a.display)}</span>
    </div>
  `).join('');
  div.innerHTML = `<div class="title">📋 Kế hoạch thực thi</div>${items}`;
  chatArea.appendChild(div);
  scrollToBottom();
}

function addTypingIndicator() {
  const div = document.createElement('div');
  div.className = 'msg ai';
  div.id = 'typingIndicator';
  div.innerHTML = `<div class="bubble"><div class="typing-indicator"><span></span><span></span><span></span></div></div>`;
  chatArea.appendChild(div);
  scrollToBottom();
}

function removeTypingIndicator() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function formatMarkdown(text) {
  // Basic markdown: bold, italic, code, newlines
  return escapeHtml(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`(.*?)`/g, '<code style="background:#2d2d4a;padding:2px 6px;border-radius:4px;font-size:13px">$1</code>')
    .replace(/\n/g, '<br>');
}

async function sendMessage() {
  const query = queryInput.value.trim();
  if (!query) return;

  queryInput.value = '';
  sendBtn.disabled = true;

  addUserMessage(query);
  addTypingIndicator();

  try {
    const response = await fetch(`${API_BASE}/v4/chat/stream-test`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, history })
    });

    removeTypingIndicator();

    const reader = response.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop(); // Keep incomplete line

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const dataStr = line.slice(6).trim();
        if (!dataStr) continue;

        try {
          const data = JSON.parse(dataStr);
          const type = data.type;

          if (type === 'thought') {
            addEventPill('thought', data.content);
          } else if (type === 'status') {
            addEventPill('status', data.content);
          } else if (type === 'actions') {
            addActionsCard(data.actions || []);
          } else if (type === 'text') {
            addAIMessage(data.content);
            history.push({ role: 'user', content: query });
            history.push({ role: 'assistant', content: data.content });
          } else if (type === 'final') {
            // Title, follow_ups etc.
            if (data.title) {
              document.title = data.title + ' - Agent Chat';
            }
          }
          // Ignore 'intent' etc.
        } catch (e) {
          // Multi-event on single line, try splitting
          const parts = dataStr.split('data: ');
          // Ignore parse errors for combined events
        }
      }
    }
  } catch (err) {
    removeTypingIndicator();
    addAIMessage(`❌ Lỗi kết nối: ${err.message}`);
  }

  sendBtn.disabled = false;
  queryInput.focus();
}
</script>
</body>
</html>
