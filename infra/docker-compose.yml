services:
  agent-service:
    build:
      context: ..
      dockerfile: infra/docker/agent-service.Dockerfile
    env_file:
      - ../.env
    ports:
      - "8100:8100"
    working_dir: /app/src/apps/agent-service
    volumes:
      # Bind mount code từ host vào container để code changes được reflect ngay
      - ..:/app/src
