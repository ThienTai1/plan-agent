apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-service
  template:
    metadata:
      labels:
        app: agent-service
    spec:
      containers:
        - name: agent-service
          image: ghcr.io/example/agent-service:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: agent-env
          ports:
            - containerPort: 8100
---
apiVersion: v1
kind: Service
metadata:
  name: agent-service
spec:
  type: ClusterIP
  selector:
    app: agent-service
  ports:
    - port: 8100
      targetPort: 8100
